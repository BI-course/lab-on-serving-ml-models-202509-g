version: "3.8"

services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servingmlmodels-flask-gunicorn-app
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: servingmlmodels-nginx
    ports:
      - "80:80"
    volumes:
      - ./container-volumes/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - flask-app
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge